syntax = "proto3";

package serverGRPC;

option go_package = "gen/serverGRPC";

service ApiUsers {
    rpc CreateUser (CreateUserRequest) returns (StatusCode);
    rpc InfoUser ()
}

message CreateUserRequest {  
    string user_name = 1;    
    string user_email = 2;   
    string user_password = 3;
}

message StatusCode {
    int32 code = 1;  
}

message UserOutput {
    int id = 1;
    string user_name = 2;    
    string user_email = 3;   
}

message UserInput {
    string user_name = 1;    
    string user_email = 2;   
    string user_password = 3;
}