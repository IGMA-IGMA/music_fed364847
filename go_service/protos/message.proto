syntax = "proto3";

package serverGRPC;

option go_package = "gen/serverGRPC";

service ApiUsers {
    rpc CreateUser (UserInput) returns (StatusCode);
    rpc Login(UserInput) returns (LoginResponse);
    rpc GetUser(Empty) returns (UserOutput);
    rpc DeleteUser(Empty) returns (StatusCode);
    rpc AddLike(LikeRequest) returns (StatusCode);
    rpc RemoveLike(LikeRequest) returns (StatusCode);
}

message Empty {}

message LoginResponse{
    StatusCode status = 1;
    string message = 2;
    string token = 3;
    UserOutput user = 4;
}

message StatusCode {
    int32 code = 1;  
}

message UserOutput {
    int32 id = 1;
    string user_name = 2;    
    string user_email = 3;   
}

message UserInput {
    string user_name = 1;    
    string user_email = 2;   
    string user_password = 3;
}

message LikeRequest {
    TokenJWT token = 1;
    int32 artist_id = 2;
}

message TokenJWT {
    string token = 1;
}