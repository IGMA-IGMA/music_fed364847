<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #8b5a2b;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #6b441e;
        }
        .message {
            margin-top: 10px;
            padding: 8px;
            text-align: center;
        }
        .error {
            background: #ffdddd;
            color: red;
        }
        .success {
            background: #ddffdd;
            color: green;
        }
        .register-link {
            text-align: center;
            margin-top: 15px;
        }
        .register-link a {
            color: #8b5a2b;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="auth-box">
    <h2>Вход</h2>
    <form id="authForm">
        {% csrf_token %}
        <label>Email</label>
        <input type="email" name="email" required>

        <label>Пароль</label>
        <input type="password" name="password" required>

        <button type="submit">Войти</button>
    </form>
    <div id="message" class="message"></div>
    <div class="register-link">
        Нет аккаунта? <a href="{% url 'register_page' %}">Зарегистрироваться</a>
    </div>
    <p style="margin-top: 15px; text-align: center;">
        <a href="{% url 'artists_all' %}">← На главную</a>
    </p>
</div>

<script>
    document.getElementById('authForm').onsubmit = async function(e) {
        e.preventDefault();
        let formData = new FormData(this);
        let btn = this.querySelector('button');
        btn.disabled = true;
        btn.innerText = 'Вход...';

        try {
            let response = await fetch('', {
                method: 'POST',
                body: formData,
                headers: {'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value}
            });
            
            let data = await response.json();
            let msgDiv = document.getElementById('message');
            
            if (data.status === 'success') {
                msgDiv.className = 'message success';
                msgDiv.innerText = '✅ ' + data.message;
                // Перенаправляем на главную страницу после успешного входа
                setTimeout(() => {
                    window.location.href = data.redirect_url  '/';
                }, 1000);
            } else {
                msgDiv.className = 'message error';
                msgDiv.innerText = '❌ ' + (data.message  'Ошибка входа');
                btn.disabled = false;
                btn.innerText = 'Войти';
            }
        } catch(err) {
            document.getElementById('message').innerText = '❌ Ошибка соединения с сервером';
            btn.disabled = false;
            btn.innerText = 'Войти';
        }
    };
</script>
</body>
</html>
