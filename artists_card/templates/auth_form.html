<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | MusicApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeInUp 0.6s ease-out;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .logo a {
            color: #ff4d4d;
            font-size: 2rem;
            font-weight: bold;
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .logo a:hover {
            color: #ff6666;
        }
        
        h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 2rem;
            font-size: 1.8rem;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #aaa;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
            font-family: inherit;
        }
        
        input:focus {
            border-color: #ff4d4d;
            background: rgba(255,255,255,0.15);
            box-shadow: 0 0 0 3px rgba(255,77,77,0.1);
        }
        
        input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        
        button {
            width: 100%;
            padding: 0.8rem;
            background: #ff4d4d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            font-family: inherit;
        }
        
        button:hover {
            background: #ff6666;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,77,77,0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 12px;
            display: none;
            text-align: center;
            font-size: 0.9rem;
            animation: fadeInUp 0.3s ease;
        }
        
        .success {
            background: rgba(76, 175, 80, 0.2);
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        
        .error {
            background: rgba(244, 67, 54, 0.2);
            color: #f44336;
            border: 1px solid #f44336;
        }
        
        .info {
            background: rgba(33, 150, 243, 0.2);
            color: #2196f3;
            border: 1px solid #2196f3;
        }
        
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        
        .back-link a {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-link a:hover {
            color: #ff4d4d;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .auth-container {
                padding: 1.5rem;
            }
            
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <a href="{% url 'home' %}">🎵 MusicApp</a>
        </div>
        
        <h2>Добро пожаловать</h2>
        
        <form id="authForm">
            {% csrf_token %}
            
            <div class="form-group">
                <label>👤 Логин</label>
                <input type="text" name="username" required placeholder="Введите логин" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>🔒 Пароль</label>
                <input type="password" name="password" required placeholder="Введите пароль">
            </div>
            
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" required placeholder="example@mail.com">
            </div>
            
            <button type="submit" id="submitBtn">Войти</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="back-link">
            <a href="{% url 'home' %}">← Вернуться на главную</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('authForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Показываем загрузку
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> Отправка...';
            submitBtn.disabled = true;
            messageDiv.style.display = 'none';
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    }
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ ' + data.message;
                    messageDiv.style.display = 'block';
                    form.reset();
                    
                    // Автоматически скрыть через 3 секунды
                    setTimeout(() => {
                        messageDiv.style.display = 'none';
                    }, 3000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = '❌ ' + (data.message || 'Ошибка авторизации');
                    messageDiv.style.display = 'block';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ Ошибка соединения с сервером';
                messageDiv.style.display = 'block';
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
        
        // Добавляем эффект при фокусе на полях
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.style.transform = 'scale(1.02)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.style.transform = 'scale(1)';
            });
        });
    </script>
</body>
</html>
