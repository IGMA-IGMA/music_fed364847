<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="auth_form.css">
    <script src="auth_form.js" defer></script>
</head>
<body>
<div class="auth-box">
    <h2>Вход</h2>
    <form id="authForm">
        {% csrf_token %}
        <label>Логин</label>
        <input type="text" name="username" required>

        <label>Пароль</label>
        <input type="password" name="password" required>

        <label>Email</label>
        <input type="email" name="email" required>

        <button type="submit">Войти</button>
    </form>
    <div id="message" class="message"></div>
    <p class="home-link">
        <a href="{% url 'home' %}">← На главную</a>
    </p>
</div>
</body>
</html>
