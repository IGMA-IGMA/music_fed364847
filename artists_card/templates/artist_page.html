<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ artist.name }}</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            margin: 0 auto 20px;
            overflow: hidden;
            border: 5px solid #667eea;
        }
        .photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .no-photo {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            font-weight: bold;
            margin: 0 auto 20px;
            border: 5px solid white;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .listeners {
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            font-weight: bold;
            color: #555;
        }
        .bio {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            text-align: left;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        {% if artist.photo %}
        <div class="photo">
            <img src="{{ artist.photo.url }}" alt="{{ artist.name }}">
        </div>
        {% else %}
        <div class="no-photo">
            {{ artist.name|first|upper }}
        </div>
        {% endif %}
        
        <h1>{{ artist.name }}</h1>
        <div class="listeners">
            👥 {{ artist.listeners }} слушателей
        </div>
        
        {% if artist.bio %}
        <div class="bio">
            <h3>Об артисте</h3>
            <p>{{ artist.bio }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
